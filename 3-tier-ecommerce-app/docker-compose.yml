version: '3.8'

services:

  backend:

    build: ./backend

    ports:

      - "5000:5000"

  mysql:

    image: mysql:8

    restart: always

    environment:

      MYSQL_ROOT_PASSWORD: root

      MYSQL_DATABASE: ecommerce

    ports:

      - "3306:3306"

    volumes:

      - ./database:/docker-entrypoint-initdb.d
